<!DOCTYPE html>
<html>
<head>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>진달래꽃</title>
  <link href="C:\Users\user\중앙대학교\중앙대학교 3-1\표준웹테크놀로지\송암 이형식체.zip" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 60px;
      background-color: #f5f0f0;
    }

    .poem-card {
      background: linear-gradient(145deg, #fce4ec 0%, #f8bbd0 40%, #dcedc8 100%);
      border-radius: 20px;
      padding: 48px 60px;
      width: 380px;
      text-align: center;
      font-family: '송암 이형식체', serif;
    }



    .poem-title {
      font-size: 22px;
      font-weight: 700;
      color: #ad1457;
      letter-spacing: 4px;
      margin-bottom: 28px;
    }

    .poem-body p { font-size: 15px; color: #4a3040; line-height: 2.4; }

    .poem-author { margin-top: 28px; font-size: 13px; color: #888; font-style: italic; }

  </style>


</head>

<body>
  <div class="poem-card">

    <h1 class="poem-title">진달래꽃</h1>
    <div class="poem-body">
      <p>나 보기가 역겨워</p>
      <p>가실 때에는</p>
      <p>말없이 고이 보내 드리오리다</p>
      <br>
      <p>영변에 약산</p>
      <p>진달래꽃</p>
      <p>아름 따다 가실 길에 뿌리오리다</p>
      <br>
      <p>가시는 걸음걸음</p>
      <p>놓인 그 꽃을</p>
      <p>사뿐히 즈려밟고 가시옵소서</p>
      <br>
      <p>나 보기가 역겨워</p>
      <p>가실 때에는</p>
      <p>죽어도 아니 눈물 흘리오리다</p>
    </div>
    <p class="poem-author">- 김소월</p>
  </div>

</body>

</html>
